<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>بطاقات الهدايا | Falcon Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#D32F2F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Falcon Store">
    <link rel="apple-touch-icon" href="/photos/logo-192.png">
    <style>
        /* ==================== تصميم احترافي فاخر لبطاقات الهدايا ==================== */
        .giftcards-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 1rem;
        }
        
        /* الهيدر الرئيسي */
        .giftcards-hero {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            border-radius: 32px;
            padding: 2.5rem;
            text-align: center;
            color: white;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }
        
        .giftcards-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: heroGlow 8s ease-in-out infinite;
        }
        
        @keyframes heroGlow {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-10%, -10%); }
        }
        
        .giftcards-hero i {
            font-size: 3.5rem;
            color: var(--secondary);
            margin-bottom: 1rem;
            position: relative;
            z-index: 1;
        }
        
        .giftcards-hero h1 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            position: relative;
            z-index: 1;
        }
        
        .giftcards-hero p {
            font-size: 1rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }
        
        /* شريط التصفية */
        .filter-bar {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .filter-btn {
            padding: 0.6rem 1.8rem;
            border-radius: 60px;
            border: 1.5px solid var(--border-light);
            background: transparent;
            color: var(--text-secondary);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 12px rgba(211,47,47,0.3);
        }
        
        .filter-btn:hover:not(.active) {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        /* شبكة البطاقات */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
        }
        
        /* البطاقة الواحدة */
        .store-card {
            background: var(--bg-surface);
            border-radius: 28px;
            overflow: hidden;
            border: 1px solid var(--border-light);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            cursor: pointer;
        }
        
        .store-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            border-color: var(--primary);
        }
        
        .store-card.coming-soon-card {
            opacity: 0.7;
        }
        
        .store-card.coming-soon-card:hover {
            transform: translateY(-4px);
        }
        
        /* صورة المتجر */
        .store-card-header {
            background: linear-gradient(135deg, var(--bg-body), var(--bg-elevated));
            padding: 2rem;
            text-align: center;
            position: relative;
        }
        
        .store-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto;
            background: var(--bg-surface);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .store-card:hover .store-icon {
            transform: scale(1.05);
        }
        
        .store-icon img {
            max-width: 70px;
            max-height: 70px;
            object-fit: contain;
        }
        
        /* شارة قريباً */
        .coming-soon-badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--warning);
            color: white;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 2;
        }
        
        /* معلومات المتجر */
        .store-card-body {
            padding: 1.5rem;
            text-align: center;
        }
        
        .store-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }
        
        .store-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
        }
        
        /* خيارات القيم */
        .card-options {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
            margin-bottom: 1.25rem;
        }
        
        .card-option {
            background: var(--bg-body);
            border: 2px solid var(--border-light);
            border-radius: 60px;
            padding: 0.5rem 1rem;
            min-width: 70px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        
        .card-option.active {
            border-color: var(--primary);
            background: rgba(211,47,47,0.1);
        }
        
        .card-option:hover:not(.disabled) {
            border-color: var(--primary);
            transform: scale(1.02);
        }
        
        .card-option.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .card-value {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        
        .card-price {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 700;
        }
        
        /* تأثير الخدش (Scratch Card) */
        .scratch-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                rgba(0,0,0,0.8),
                rgba(0,0,0,0.8) 20px,
                rgba(50,50,50,0.9) 20px,
                rgba(50,50,50,0.9) 40px
            );
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: crosshair;
            transition: all 0.3s;
            z-index: 10;
            backdrop-filter: blur(3px);
        }
        
        .scratch-overlay.scratched {
            opacity: 0;
            pointer-events: none;
        }
        
        .scratch-text {
            color: white;
            font-weight: bold;
            text-align: center;
            background: rgba(0,0,0,0.6);
            padding: 0.5rem 1rem;
            border-radius: 60px;
            font-size: 0.8rem;
            pointer-events: none;
        }
        
        .scratch-overlay:hover .scratch-text {
            transform: scale(1.05);
        }
        
        .hidden-code {
            display: none;
        }
        
        .code-revealed {
            background: linear-gradient(135deg, var(--success), #2E7D32);
            color: white;
            padding: 0.5rem;
            border-radius: 12px;
            font-family: monospace;
            font-size: 0.9rem;
            margin-top: 0.5rem;
            text-align: center;
        }
        
        /* زر الشراء */
        .buy-section {
            padding: 0 1.5rem 1.5rem 1.5rem;
        }
        
        .buy-btn {
            width: 100%;
            padding: 0.8rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .buy-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(211,47,47,0.4);
        }
        
        .buy-btn:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }
        
        /* حالة فارغة */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            background: var(--bg-surface);
            border-radius: 28px;
            border: 1px solid var(--border-light);
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--border-light);
        }
        
        /* تجاوب */
        @media (max-width: 600px) {
            .giftcards-hero {
                padding: 1.5rem;
            }
            .giftcards-hero h1 {
                font-size: 1.5rem;
            }
            .cards-grid {
                grid-template-columns: 1fr;
            }
            .filter-btn {
                padding: 0.4rem 1.2rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body class="dark">

<div id="falconLoader">
    <div class="loader-content">
        <div class="loader-dots-premium">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="loader-text-premium">جارِ التحميل...</div>
    </div>
</div>

<header class="main-header">
    <div class="header-container">
        <div class="logo-wrapper">
            <img src="photos/logo.png" alt="شعار المتجر" class="logo-img" style="width:45px;height:45px;border-radius:16px;object-fit:cover;" onerror="this.src='https://placehold.co/45x45/D32F2F/white?text=F'">
            <span class="logo-text">Falcon Store</span>
        </div>
        <a href="index.html" style="color: white; text-decoration: none;"><i class="fas fa-home"></i> الرئيسية</a>
    </div>
</header>

<div class="giftcards-container">
    <div class="giftcards-hero">
        <i class="fas fa-gift-card"></i>
        <h1>بطاقات الهدايا</h1>
        <p>اشحن رصيدك في أشهر المتاجر العالمية - أسعار تنافسية وشحن فوري</p>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">الكل</button>
        <button class="filter-btn" data-filter="available">متاحة</button>
        <button class="filter-btn" data-filter="soon">قريباً</button>
    </div>

    <div class="cards-grid" id="giftcardsGrid"></div>
</div>

<!-- ==================== قسم التعليقات والآراء ==================== -->
<div class="comments-wrapper">
    <div class="comments-card">
        <h3><i class="fas fa-comments"></i> آراء واستفسارات العملاء</h3>
        <div class="comments-subtitle">شاركنا رأيك أو مشكلتك، سيقوم فريق الدعم بالرد عليك خلال 24 ساعة</div>
        <div id="commentsSection"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/comments.js"></script>

<script>
    // Loader
    window.addEventListener('load', ()=>{
        const l=document.getElementById('falconLoader');
        if(l){ l.classList.add('fade-out'); setTimeout(()=>l.style.display='none',1000); }
    });
    setTimeout(()=>{
        const l=document.getElementById('falconLoader');
        if(l&&l.style.display!=='none'){ l.classList.add('fade-out'); setTimeout(()=>l.style.display='none',1000); }
    },5000);

    // بيانات بطاقات الهدايا مع أكواد سرية للتأثير الخدش
    const giftcards = [
        { 
            id: 'steam', name: 'Steam', icon: 'photos/steam.jpg', available: true,
            description: 'بطاقات Steam لشراء الألعاب على المنصة',
            secretCode: 'STEAM-SECRET-2026',
            options: [
                { value: '$10', price: 550, code: 'STEAM10' },
                { value: '$20', price: 1100, code: 'STEAM20' },
                { value: '$50', price: 2750, code: 'STEAM50' },
                { value: '$100', price: 5500, code: 'STEAM100' }
            ] 
        },
        { 
            id: 'googleplay', name: 'Google Play', icon: 'photos/googleplay.jpg', available: true,
            description: 'شحن محفظة Google Play للتطبيقات والألعاب',
            secretCode: 'GOOGLE-SECRET-2026',
            options: [
                { value: '$10', price: 550, code: 'GP10' },
                { value: '$25', price: 1375, code: 'GP25' },
                { value: '$50', price: 2750, code: 'GP50' }
            ] 
        },
        { 
            id: 'apple', name: 'Apple iTunes', icon: 'photos/apple.jpg', available: false,
            description: 'بطاقات iTunes لشراء التطبيقات والأفلام',
            secretCode: 'APPLE-SECRET-2026',
            options: [
                { value: '$15', price: 825, code: 'APPLE15' },
                { value: '$25', price: 1375, code: 'APPLE25' },
                { value: '$50', price: 2750, code: 'APPLE50' }
            ] 
        },
        { 
            id: 'amazon', name: 'Amazon', icon: 'photos/amazon.jpg', available: false,
            description: 'بطاقات أمازون للتسوق من الموقع العالمي',
            secretCode: 'AMAZON-SECRET-2026',
            options: [
                { value: '$25', price: 1375, code: 'AMZN25' },
                { value: '$50', price: 2750, code: 'AMZN50' }
            ] 
        },
        { 
            id: 'playstation', name: 'PlayStation', icon: 'photos/psplus.jpg', available: false,
            description: 'بطاقات PlayStation Network',
            secretCode: 'PSN-SECRET-2026',
            options: [
                { value: '$20', price: 1100, code: 'PSN20' },
                { value: '$50', price: 2750, code: 'PSN50' }
            ] 
        },
        { 
            id: 'xbox', name: 'Xbox', icon: 'photos/xbox.jpg', available: false,
            description: 'بطاقات Xbox Game Pass و Xbox Gift Cards',
            secretCode: 'XBOX-SECRET-2026',
            options: [
                { value: '$25', price: 1375, code: 'XBOX25' },
                { value: '$50', price: 2750, code: 'XBOX50' }
            ] 
        },
        { 
            id: 'razer', name: 'Razer Gold', icon: 'photos/razer.jpg', available: false,
            description: 'بطاقات Razer Gold لشحن رصيد الألعاب',
            secretCode: 'RAZER-SECRET-2026',
            options: [
                { value: '$10', price: 550, code: 'RAZER10' },
                { value: '$25', price: 1375, code: 'RAZER25' }
            ] 
        }
    ];

    let currentFilter = 'all';
    let selectedOptions = {};
    let scratchedCards = JSON.parse(localStorage.getItem('scratchedCards') || '{}');

    function renderGrid() {
        const grid = document.getElementById('giftcardsGrid');
        const filtered = giftcards.filter(card => {
            if (currentFilter === 'available') return card.available;
            if (currentFilter === 'soon') return !card.available;
            return true;
        });

        if (filtered.length === 0) {
            grid.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>لا توجد بطاقات في هذا التصنيف</p></div>';
            return;
        }

        grid.innerHTML = filtered.map(card => {
            const isAvailable = card.available;
            const selectedIdx = selectedOptions[card.id] || 0;
            const isScratched = scratchedCards[card.id] === true;
            
            return `
                <div class="store-card ${!isAvailable ? 'coming-soon-card' : ''}" id="card-${card.id}" style="position: relative;">
                    ${!isAvailable ? '<div class="coming-soon-badge">⏳ قريباً</div>' : ''}
                    ${isAvailable && !isScratched ? `
                        <div class="scratch-overlay" id="scratch-${card.id}" onclick="scratchCard('${card.id}')">
                            <div class="scratch-text">
                                <i class="fas fa-hand-pointer"></i><br>
                                اسحب لتكشف الكود<br>
                                <span style="font-size:0.7rem;">🎁 مفاجأة!</span>
                            </div>
                        </div>
                    ` : ''}
                    <div class="store-card-header">
                        <div class="store-icon">
                            <img src="${card.icon}" alt="${card.name}" onerror="this.src='https://placehold.co/100/D32F2F/white?text=${card.name}'">
                        </div>
                    </div>
                    <div class="store-card-body">
                        <div class="store-name">${card.name}</div>
                        <div class="store-desc">${card.description}</div>
                        ${isAvailable && isScratched ? `<div class="code-revealed"><i class="fas fa-ticket-alt"></i> كودك السري: <strong>${card.secretCode}</strong></div>` : ''}
                        <div class="card-options">
                            ${card.options.map((opt, idx) => `
                                <div class="card-option ${idx === selectedIdx ? 'active' : ''} ${!isAvailable ? 'disabled' : ''}" onclick="${isAvailable ? `selectOption('${card.id}', ${idx})` : ''}">
                                    <div class="card-value">${opt.value}</div>
                                    <div class="card-price">${opt.price} ج.م</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                    <div class="buy-section">
                        <button class="buy-btn" ${!isAvailable ? 'disabled' : ''} onclick="buyGiftCard('${card.id}')">
                            <i class="fas fa-shopping-cart"></i> شراء الآن
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    // تأثير الخدش
    function scratchCard(cardId) {
        if (scratchedCards[cardId]) return;
        
        // تشغيل صوت الخدش
        if (typeof playClickSound === 'function') playClickSound();
        else new Audio('sounds/click.mp3').play().catch(()=>{});
        
        // تأثير اهتزاز
        if (typeof triggerHapticFeedback === 'function') triggerHapticFeedback('light');
        
        // إظهار الكود
        scratchedCards[cardId] = true;
        localStorage.setItem('scratchedCards', JSON.stringify(scratchedCards));
        
        // إعادة عرض البطاقة مع الكود المكشوف
        renderGrid();
        
        // عرض إشعار بالكود
        const card = giftcards.find(c => c.id === cardId);
        if (card) {
            setTimeout(() => {
                if (typeof showSuccessModal === 'function') {
                    showSuccessModal(`🎉 كود ${card.name}: ${card.secretCode}\n\nاستخدم هذا الكود عند الشراء للحصول على خصم إضافي!`, 'كود سري مكشوف');
                } else {
                    alert(`🎉 كود ${card.name}: ${card.secretCode}`);
                }
                if (typeof playRewardSound === 'function') playRewardSound();
                else new Audio('sounds/reward.mp3').play().catch(()=>{});
            }, 100);
        }
    }

    window.selectOption = function(cardId, idx) {
        const card = giftcards.find(c => c.id === cardId);
        if (!card || !card.available) return;
        selectedOptions[cardId] = idx;
        renderGrid();
        if (typeof playClickSound === 'function') playClickSound();
        else new Audio('sounds/click.mp3').play().catch(()=>{});
    };

    window.buyGiftCard = function(cardId) {
        const user = getCurrentUser();
        if (!user) {
            showLoginRequired();
            return;
        }
        const card = giftcards.find(c => c.id === cardId);
        if (!card || !card.available) return;
        const opt = card.options[selectedOptions[cardId] || 0];
        
        const orderData = {
            game: `بطاقة ${card.name}`,
            gameKey: 'giftcard',
            type: 'giftcard',
            category: cardId,
            item: { name: `${card.name} ${opt.value}`, price: opt.price, code: opt.code },
            quantity: 1,
            totalPrice: opt.price,
            playerId: null,
            orderNote: scratchedCards[cardId] ? `كود خدش: ${card.secretCode}` : '',
            timestamp: Date.now()
        };
        
        sessionStorage.setItem('currentOrder', JSON.stringify(orderData));
        if (typeof playClick2Sound === 'function') playClick2Sound();
        else new Audio('sounds/click2.mp3').play().catch(()=>{});
        window.location.href = 'checkout.html';
    };

    function showLoginRequired() {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.style.display = 'flex';
        overlay.style.zIndex = '10000';
        overlay.innerHTML = `<div class="modal-card"><div class="modal-icon">🔐</div><h2>تسجيل الدخول مطلوب</h2><p>يجب تسجيل الدخول لشراء بطاقات الهدايا.</p><div class="modal-actions"><button class="btn btn-primary" onclick="window.location.href='login.html'">تسجيل الدخول</button><button class="btn btn-outline" onclick="window.location.href='signup.html'">إنشاء حساب</button></div></div>`;
        document.body.appendChild(overlay);
        overlay.addEventListener('click', e => { if(e.target === overlay) overlay.remove(); });
        if (typeof playTingSound === 'function') playTingSound();
        else new Audio('sounds/ting.mp3').play().catch(()=>{});
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            renderGrid();
            if (typeof playClickSound === 'function') playClickSound();
            else new Audio('sounds/click.mp3').play().catch(()=>{});
        });
    });

    // تهيئة نظام التعليقات
    if (typeof initComments === 'function') {
        initComments('giftcards');
    }

    renderGrid();
</script>
</body>
</html>
