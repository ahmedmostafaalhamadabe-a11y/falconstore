<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>عجلة الحظ | قريباً | Falcon Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#D32F2F">
    
    <style>
        .coming-soon-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            padding: 1rem;
        }
        
        .coming-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            border-radius: 48px;
            padding: 3rem 2rem;
            max-width: 550px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .coming-card i {
            font-size: 5rem;
            color: var(--secondary);
            margin-bottom: 1.5rem;
            animation: spin 3s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .coming-card h1 {
            color: white;
            margin-bottom: 1rem;
            font-size: 2.5rem;
            font-weight: 800;
        }
        
        .coming-card p {
            color: rgba(255,255,255,0.8);
            margin-bottom: 2rem;
            font-size: 1.1rem;
        }
        
        .back-home {
            background: linear-gradient(135deg, var(--secondary), #FFA000);
            color: #8B0000;
            border: none;
            padding: 12px 35px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s;
        }
        
        .back-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        
        .dua-text {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px dashed rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.6);
            font-style: italic;
            line-height: 1.8;
            font-size: 0.9rem;
        }
        
        .dua-text i {
            font-size: 1rem;
            margin: 0 5px;
            animation: none;
        }
        
        @media (max-width: 550px) {
            .coming-card {
                padding: 2rem 1.5rem;
            }
            .coming-card h1 {
                font-size: 1.8rem;
            }
            .coming-card i {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body class="light">

<div id="falconLoader">
    <div class="loader-content">
        <div class="loader-dots-premium">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="loader-text-premium">جارِ التحميل...</div>
    </div>
</div>

<div class="coming-soon-container">
    <div class="coming-card">
        <i class="fas fa-circle-notch fa-spin"></i>
        <h1>🎡 عجلة الحظ</h1>
        <p>هذه الميزة قيد التطوير حالياً<br>وستتوفر قريباً جداً بإذن الله</p>
        <a href="index.html" class="back-home"><i class="fas fa-home"></i> العودة للرئيسية</a>
        <div class="dua-text">
            <i class="fas fa-hands-praying"></i> ادعو لنا بالتوفيق وتيسير الأمور<br>
            وتطوير اسم Falcon في السنين القادمة إن شاء الله <i class="fas fa-heart"></i>
        </div>
    </div>
</div>

<script>
    window.addEventListener('load', ()=>{
        const l=document.getElementById('falconLoader');
        if(l){ l.classList.add('fade-out'); setTimeout(()=>l.style.display='none',1000); }
    });
    setTimeout(()=>{
        const l=document.getElementById('falconLoader');
        if(l&&l.style.display!=='none'){ l.classList.add('fade-out'); setTimeout(()=>l.style.display='none',1000); }
    },5000);
</script>
</body>
</html>
