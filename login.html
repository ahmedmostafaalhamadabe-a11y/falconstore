<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | Falcon Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: #FFF8F8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }
        .login-card {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #EF9A9A;
        }
        h1 { color: #B71C1C; margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 60px;
            border: 1px solid #EF9A9A;
            font-family: 'Cairo', sans-serif;
        }
        button {
            width: 100%;
            background: #D32F2F;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
        }
        .error-msg {
            color: red;
            margin-top: 1rem;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1><i class="fas fa-falcon"></i> Falcon Store</h1>
    
    <div id="loginForm">
        <input type="email" id="email" placeholder="البريد الإلكتروني">
        <input type="password" id="password" placeholder="كلمة المرور">
        <button id="loginBtn">تسجيل الدخول</button>
        <div id="errorMsg" class="error-msg"></div>
    </div>
    
    <div style="margin-top: 1rem;">
        <a href="index.html" style="color: #D32F2F;">← العودة للرئيسية</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script>
    // إعدادات Firebase (من Firebase Console)
    const firebaseConfig = {
        apiKey: "AIzaSyDCnsGh-iJfmOXIHdN5_-b5KEJQPZJSInU",
        authDomain: "falcon-store-1ab4e.firebaseapp.com",
        projectId: "falcon-store-1ab4e",
        storageBucket: "falcon-store-1ab4e.firebasestorage.app",
        messagingSenderId: "650854731670",
        appId: "1:650854731670:web:fc25b7897dd530e244d7b7"
    };

    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // تسجيل الدخول
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('errorMsg');
        
        if (!email || !password) {
            errorDiv.innerText = '❌ يرجى إدخال البريد الإلكتروني وكلمة المرور';
            return;
        }
        
        try {
            await auth.signInWithEmailAndPassword(email, password);
            window.location.href = 'index.html';
        } catch (error) {
            errorDiv.innerText = '❌ ' + error.message;
        }
    });
</script>
</body>
</html>
