<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>تسجيل الدخول | Falcon Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            padding: 1rem;
        }
        .login-card {
            background: var(--bg-surface);
            border-radius: 32px;
            padding: 2.5rem;
            max-width: 420px;
            width: 100%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
        }
        .login-logo { font-size: 2.5rem; color: var(--primary); margin-bottom: 0.5rem; }
        .login-card h1 { color: var(--text-primary); margin-bottom: 0.5rem; }
        .login-card p { color: var(--text-secondary); margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1.2rem; text-align: right; }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 60px;
            border: 1.5px solid var(--border-light);
            background: var(--bg-body);
            font-family: 'Cairo', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
            color: var(--text-primary);
        }
        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(211,47,47,0.1);
        }
        .password-wrapper { position: relative; }
        .password-toggle {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.3s;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(211,47,47,0.4); }
        .login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .forgot-link { display: block; text-align: left; margin-top: 0.5rem; color: var(--primary); text-decoration: none; font-size: 0.85rem; }
        .social-divider { position: relative; margin: 1.5rem 0; text-align: center; }
        .social-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-light);
            z-index: 0;
        }
        .social-divider span {
            background: var(--bg-surface);
            padding: 0 1rem;
            position: relative;
            z-index: 1;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .social-buttons { display: flex; flex-direction: column; gap: 0.75rem; margin-top: 0.5rem; }
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            border: 1.5px solid var(--border-light);
            background: var(--bg-surface);
            color: var(--text-primary);
            font-family: 'Cairo', sans-serif;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .social-btn:hover { transform: translateY(-2px); }
        .social-btn.google { border-color: #DB4437; }
        .social-btn.google:hover { background: #DB4437; color: white; }
        .social-btn.facebook { border-color: #1877F2; }
        .social-btn.facebook:hover { background: #1877F2; color: white; }
        body.dark .social-btn { background: #2a2a2a; color: white; }
        .signup-link { margin-top: 1.5rem; color: var(--text-muted); }
        .signup-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .error-msg { color: var(--danger); font-size: 0.8rem; margin-top: 0.25rem; min-height: 20px; }
        .back-home { display: inline-block; margin-top: 1rem; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; }
        .otp-section { display: none; }
        .otp-input {
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 8px;
        }
        .info-box {
            background: #FFF3CD;
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 1rem;
            color: #856404;
            font-size: 0.85rem;
        }
        body.dark .info-box { background: #3E2723; color: #FFB74D; }
    </style>
</head>
<body>

<div id="falconLoader">
    <div class="loader-content">
        <div class="loader-dots-premium"><span></span><span></span><span></span></div>
        <div class="loader-text-premium">جارِ التحميل...</div>
    </div>
</div>

<div class="login-card">
    <div class="login-logo"><i class="fas fa-falcon"></i></div>
    <h1>Falcon Store</h1>
    <p id="stepTitle">تسجيل الدخول إلى حسابك</p>
    
    <!-- الخطوة 1: البريد وكلمة السر -->
    <div id="step1">
        <div class="input-group">
            <input type="email" id="email" placeholder="البريد الإلكتروني" dir="ltr">
        </div>
        <div class="input-group">
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="كلمة السر">
                <button class="password-toggle" onclick="togglePassword()" type="button">
                    <i class="fas fa-eye"></i>
                </button>
            </div>
        </div>
        <div class="error-msg" id="loginError"></div>
        <a href="forgot-password.html" class="forgot-link">نسيت كلمة السر؟</a>
        <button class="login-btn" id="loginBtn" onclick="sendOTP()">
            <i class="fas fa-paper-plane"></i> متابعة
        </button>
    </div>
    
    <!-- الخطوة 2: إدخال رمز التحقق -->
    <div id="step2" class="otp-section">
        <div class="info-box">
            <i class="fas fa-envelope"></i> تم إرسال رمز التحقق إلى بريدك الإلكتروني
        </div>
        <div class="input-group">
            <input type="text" id="otpCode" class="otp-input" placeholder="000000" maxlength="6" inputmode="numeric">
        </div>
        <div class="error-msg" id="otpError"></div>
        <button class="login-btn" onclick="verifyOTPAndLogin()">
            <i class="fas fa-check"></i> تأكيد الرمز
        </button>
        <button class="login-btn" onclick="resendOTP()" style="background: var(--text-muted); margin-top: 0.5rem;">
            <i class="fas fa-redo-alt"></i> إعادة إرسال الرمز
        </button>
        <button class="back-home" onclick="goBackToStep1()">← العودة إلى تسجيل الدخول</button>
    </div>
    
    <div class="social-divider"><span>أو</span></div>
    
    <div class="social-buttons">
        <button class="social-btn google" onclick="loginWithGoogleHandler()">
            <i class="fab fa-google"></i> متابعة باستخدام Google
        </button>
        <button class="social-btn facebook" onclick="loginWithFacebookHandler()">
            <i class="fab fa-facebook"></i> متابعة باستخدام Facebook
        </button>
    </div>
    
    <div class="signup-link">
        ليس لديك حساب؟ <a href="signup.html">إنشاء حساب جديد</a>
    </div>
    <a href="index.html" class="back-home">← العودة للرئيسية</a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>

<script>
    window.addEventListener('load', ()=>{
        const l=document.getElementById('falconLoader');
        if(l){ l.classList.add('fade-out'); setTimeout(()=>l.style.display='none',1000); }
    });
    setTimeout(()=>{
        const l=document.getElementById('falconLoader');
        if(l&&l.style.display!=='none'){ l.classList.add('fade-out'); setTimeout(()=>l.style.display='none',1000); }
    },5000);

    let pendingEmail = '';
    let pendingPassword = '';
    let generatedOTP = '';
    let loginTimer = null;

    function togglePassword() {
        const field = document.getElementById('password');
        const icon = field.parentElement.querySelector('.password-toggle i');
        if (field.type === 'password') {
            field.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            field.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    }

    async function sendOTP() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('loginError');
        
        if (!email || !password) {
            errorEl.textContent = '❌ أدخل البريد وكلمة السر';
            if (typeof playErrorSound === 'function') playErrorSound();
            return;
        }
        
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحقق...';
        
        try {
            // التحقق من صحة البريد وكلمة السر
            const result = await firebase.auth().signInWithEmailAndPassword(email, password);
            const user = result.user;
            
            // تسجيل الخروج فوراً (لأننا فقط نتحقق من صحة البيانات)
            await firebase.auth().signOut();
            
            // التحقق من تأكيد البريد الإلكتروني
            if (!user.emailVerified) {
                errorEl.textContent = '❌ يرجى تأكيد بريدك الإلكتروني أولاً. تم إرسال رابط التأكيد إلى بريدك.';
                if (typeof playErrorSound === 'function') playErrorSound();
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i> متابعة';
                return;
            }
            
            // تخزين البيانات المؤقتة
            pendingEmail = email;
            pendingPassword = password;
            
            // إنشاء رمز عشوائي
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            
            // إرسال الرمز عبر البريد الإلكتروني
            const sent = await sendEmailOTP(email, generatedOTP);
            
            if (sent) {
                // إظهار خطوة إدخال الرمز
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                document.getElementById('stepTitle').textContent = 'تأكيد رمز التحقق';
                if (typeof playTingSound === 'function') playTingSound();
                
                // بدء مؤقت 5 دقائق
                startOTPTimer();
            } else {
                errorEl.textContent = '❌ فشل إرسال رمز التحقق';
                if (typeof playErrorSound === 'function') playErrorSound();
            }
            
        } catch(e) {
            console.error(e);
            let errorMessage = '❌ حدث خطأ';
            if (e.code === 'auth/wrong-password') errorMessage = '❌ كلمة السر غير صحيحة';
            else if (e.code === 'auth/user-not-found') errorMessage = '❌ لا يوجد حساب بهذا البريد';
            else if (e.code === 'auth/too-many-requests') errorMessage = '❌ طلبات كثيرة. حاول لاحقاً';
            else errorMessage = '❌ ' + e.message;
            
            errorEl.textContent = errorMessage;
            if (typeof playErrorSound === 'function') playErrorSound();
        }
        
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-paper-plane"></i> متابعة';
    }
    
    function startOTPTimer() {
        if (loginTimer) clearInterval(loginTimer);
        let secondsLeft = 300; // 5 دقائق
        const timerEl = document.createElement('div');
        timerEl.id = 'otpTimer';
        timerEl.style.cssText = 'font-size:0.8rem; color:var(--text-muted); margin-top:0.5rem;';
        timerEl.innerHTML = `⏳ الرمز صالح لمدة: <span id="timerSeconds">05:00</span>`;
        document.getElementById('step2').appendChild(timerEl);
        
        loginTimer = setInterval(() => {
            secondsLeft--;
            const mins = Math.floor(secondsLeft / 60);
            const secs = secondsLeft % 60;
            const timerSpan = document.getElementById('timerSeconds');
            if (timerSpan) timerSpan.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            if (secondsLeft <= 0) {
                clearInterval(loginTimer);
                if (timerEl) timerEl.innerHTML = '⏰ انتهت صلاحية الرمز. يرجى إعادة المحاولة.';
                document.getElementById('otpCode').disabled = true;
            }
        }, 1000);
    }
    
    async function verifyOTPAndLogin() {
        const code = document.getElementById('otpCode').value.trim();
        const errorEl = document.getElementById('otpError');
        
        if (!code) {
            errorEl.textContent = '❌ أدخل رمز التحقق';
            if (typeof playErrorSound === 'function') playErrorSound();
            return;
        }
        
        if (code !== generatedOTP) {
            errorEl.textContent = '❌ رمز التحقق غير صحيح';
            if (typeof playErrorSound === 'function') playErrorSound();
            return;
        }
        
        const btn = event?.target;
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري تسجيل الدخول...'; }
        
        try {
            // تسجيل الدخول الفعلي
            const result = await loginWithEmail(pendingEmail, pendingPassword);
            const user = result.user;
            
            // التحقق من وجود المستخدم في Firestore
            const doc = await db.collection('users').doc(user.uid).get();
            if (!doc.exists) {
                const accNum = await generateAccountNumber();
                await db.collection('users').doc(user.uid).set({ 
                    email: user.email, 
                    displayName: pendingEmail.split('@')[0], 
                    accountNumber: accNum, 
                    loyaltyPoints: 0, 
                    createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                });
            }
            
            await logActivity(`${user.displayName || pendingEmail.split('@')[0]} سجل دخوله`, '🔵');
            
            if (loginTimer) clearInterval(loginTimer);
            
            // رسالة الترحيب
            const hour = new Date().getHours();
            const greeting = hour < 12 ? 'صباح الخير' : (hour < 18 ? 'مساء الخير' : 'مساء الخير');
            setTimeout(() => {
                if (typeof showSuccessModal === 'function') {
                    showSuccessModal(`${greeting} ${user.displayName || pendingEmail.split('@')[0]}! أهلاً بك في Falcon Store 🦅`, 'تم تسجيل الدخول');
                }
                if (typeof playWelcomeSound === 'function') playWelcomeSound();
            }, 500);
            
        } catch(e) {
            errorEl.textContent = '❌ فشل تسجيل الدخول: ' + e.message;
            if (typeof playErrorSound === 'function') playErrorSound();
            if (btn) { btn.disabled = false; btn.innerHTML = 'تأكيد الرمز'; }
        }
    }
    
    async function resendOTP() {
        if (!pendingEmail) return;
        
        generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
        const sent = await sendEmailOTP(pendingEmail, generatedOTP);
        
        if (sent) {
            if (typeof showSuccessModal === 'function') {
                showSuccessModal('✅ تم إعادة إرسال رمز التحقق إلى بريدك الإلكتروني', 'تم الإرسال');
            }
            if (typeof playTingSound === 'function') playTingSound();
            
            // إعادة تعيين المؤقت
            if (loginTimer) clearInterval(loginTimer);
            startOTPTimer();
        } else {
            document.getElementById('otpError').textContent = '❌ فشل إعادة إرسال الرمز';
            if (typeof playErrorSound === 'function') playErrorSound();
        }
    }
    
    function goBackToStep1() {
        document.getElementById('step1').style.display = 'block';
        document.getElementById('step2').style.display = 'none';
        document.getElementById('stepTitle').textContent = 'تسجيل الدخول إلى حسابك';
        document.getElementById('otpCode').value = '';
        document.getElementById('otpError').textContent = '';
        pendingEmail = '';
        pendingPassword = '';
        generatedOTP = '';
        if (loginTimer) clearInterval(loginTimer);
        const timerEl = document.getElementById('otpTimer');
        if (timerEl) timerEl.remove();
    }
    
    async function loginWithGoogleHandler() {
        const btn = event?.target;
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...'; }
        try {
            const result = await loginWithGoogle();
            const user = result.user;
            
            const userDoc = await db.collection('users').doc(user.uid).get();
            if(!userDoc.exists) {
                const n = await generateAccountNumber();
                await db.collection('users').doc(user.uid).set({ 
                    email: user.email, 
                    displayName: user.displayName || user.email?.split('@')[0] || 'مستخدم', 
                    photoURL: user.photoURL, 
                    accountNumber: n, 
                    loyaltyPoints: 20, 
                    provider: 'google', 
                    createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                });
            }
            
            await logActivity(`${user.displayName||user.email} سجل دخوله بـ Google`, '🔵');
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
            
        } catch(e) { 
            if(typeof playErrorSound === 'function') playErrorSound();
            const err=document.getElementById('loginError');
            err.textContent='❌ فشل تسجيل الدخول بـ Google: ' + (e.message || 'خطأ غير معروف');
        }
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fab fa-google"></i> متابعة باستخدام Google'; }
    }
    
    async function loginWithFacebookHandler() {
        const btn = event?.target;
        if (btn) { btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري...'; }
        try {
            const result = await loginWithFacebook();
            const user = result.user;
            
            const userDoc = await db.collection('users').doc(user.uid).get();
            if(!userDoc.exists) {
                const n = await generateAccountNumber();
                await db.collection('users').doc(user.uid).set({ 
                    email: user.email, 
                    displayName: user.displayName || user.email?.split('@')[0] || 'مستخدم', 
                    photoURL: user.photoURL, 
                    accountNumber: n, 
                    loyaltyPoints: 20, 
                    provider: 'facebook', 
                    createdAt: firebase.firestore.FieldValue.serverTimestamp() 
                });
            }
            
            await logActivity(`${user.displayName||user.email} سجل دخوله بـ Facebook`, '🔵');
            
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
            
        } catch(e) { 
            if(typeof playErrorSound === 'function') playErrorSound();
            const err=document.getElementById('loginError');
            err.textContent='❌ فشل تسجيل الدخول بـ Facebook: ' + (e.message || 'خطأ غير معروف');
        }
        if (btn) { btn.disabled = false; btn.innerHTML = '<i class="fab fa-facebook"></i> متابعة باستخدام Facebook'; }
    }
    
    window.togglePassword = togglePassword;
    window.sendOTP = sendOTP;
    window.verifyOTPAndLogin = verifyOTPAndLogin;
    window.resendOTP = resendOTP;
    window.goBackToStep1 = goBackToStep1;
    window.loginWithGoogleHandler = loginWithGoogleHandler;
    window.loginWithFacebookHandler = loginWithFacebookHandler;
</script>
</body>
</html>
