<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>استعادة كلمة السر | Falcon Store</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    
    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%); padding: 1rem; }
        .forgot-card { background: var(--bg-surface); border-radius: var(--radius-xl); padding: 2.5rem; max-width: 420px; width: 100%; text-align: center; box-shadow: var(--shadow-lg); }
        .forgot-logo { font-size: 2.5rem; color: var(--primary); margin-bottom: 0.5rem; }
        .forgot-card h1 { color: var(--text-primary); margin-bottom: 0.5rem; }
        .forgot-card p { color: var(--text-secondary); margin-bottom: 1.5rem; }
        .input-group { margin-bottom: 1.5rem; text-align: right; }
        .input-group input { width: 100%; padding: 14px 16px; border-radius: var(--radius-full); border: 1.5px solid var(--border-light); background: var(--bg-body); font-family: 'Cairo', sans-serif; }
        .submit-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: var(--radius-full); font-weight: bold; cursor: pointer; }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .back-link { display: inline-block; margin-top: 1.5rem; color: var(--primary); text-decoration: none; font-weight: 600; }
        .error-msg { color: var(--danger); font-size: 0.8rem; margin-top: 0.25rem; min-height: 20px; }
        .success-box { background: #E8F5E9; border-radius: var(--radius-md); padding: 1.5rem; text-align: center; }
        .success-box i { font-size: 3rem; color: var(--success); margin-bottom: 1rem; }
        .success-box h3 { color: #2E7D32; margin-bottom: 0.5rem; }
        .info-box { background: #E3F2FD; border-radius: var(--radius-md); padding: 12px; margin-bottom: 1.5rem; color: #1565C0; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="falconLoader">
    <div class="loader-content">
        <div class="loader-dots-premium">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="loader-text-premium">جارِ التحميل...</div>
    </div>
</div>

<div class="forgot-card">
    <div class="forgot-logo"><i class="fas fa-falcon"></i></div>
    <h1>استعادة كلمة السر</h1>
    <p>أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة السر</p>
    
    <div id="emailForm">
        <div class="input-group"><input type="email" id="email" placeholder="البريد الإلكتروني" dir="ltr"></div>
        <div class="error-msg" id="emailError"></div>
        <button class="submit-btn" id="submitBtn" onclick="sendResetEmail()"><i class="fas fa-paper-plane"></i> إرسال رابط الاستعادة</button>
    </div>
    
    <div id="successMessage" style="display:none;">
        <div class="success-box">
            <i class="fas fa-check-circle"></i>
            <h3>تم الإرسال!</h3>
            <p>تم إرسال رابط استعادة كلمة السر إلى بريدك الإلكتروني.</p>
            <p style="font-size:0.85rem; margin-top:1rem;"><i class="fas fa-info-circle"></i> تحقق من مجلد السبام (Spam) إذا لم يصلك.</p>
        </div>
        <button class="submit-btn" onclick="sendResetEmail()" style="margin-top:1rem;"><i class="fas fa-redo-alt"></i> إعادة الإرسال</button>
    </div>
    
    <div class="info-box"><i class="fas fa-lightbulb"></i> الرابط صالح لمدة ساعة واحدة.</div>
    <a href="login.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة إلى تسجيل الدخول</a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="js/firebase-config.js"></script>

<script>
    window.addEventListener('load', ()=>{
        const l=document.getElementById('falconLoader');
        if(l){ l.classList.add('fade-out'); setTimeout(()=>l.style.display='none',1000); }
    });
    setTimeout(()=>{
        const l=document.getElementById('falconLoader');
        if(l&&l.style.display!=='none'){ l.classList.add('fade-out'); setTimeout(()=>l.style.display='none',1000); }
    },5000);

    async function sendResetEmail() {
        const email = document.getElementById('email').value.trim();
        const err = document.getElementById('emailError');
        if (!email) { err.textContent = '❌ يرجى إدخال البريد الإلكتروني'; if (typeof playErrorSound === 'function') playErrorSound(); else new Audio('sounds/error.mp3').play().catch(()=>{}); return; }
        if (!email.includes('@')) { err.textContent = '❌ بريد إلكتروني غير صالح'; if (typeof playErrorSound === 'function') playErrorSound(); else new Audio('sounds/error.mp3').play().catch(()=>{}); return; }
        err.textContent = '';
        const btn = document.getElementById('submitBtn');
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
        try {
            await auth.sendPasswordResetEmail(email, { url: window.location.origin + '/login.html' });
            document.getElementById('emailForm').style.display = 'none';
            document.getElementById('successMessage').style.display = 'block';
            document.querySelector('.info-box').style.display = 'none';
            if (typeof playTingSound === 'function') playTingSound(); else new Audio('sounds/ting.mp3').play().catch(()=>{});
        } catch (e) {
            if (e.code === 'auth/user-not-found') err.textContent = '❌ لا يوجد حساب مسجل بهذا البريد';
            else if (e.code === 'auth/too-many-requests') err.textContent = '❌ طلبات كثيرة. حاول لاحقاً.';
            else err.textContent = '❌ حدث خطأ. حاول مرة أخرى.';
            if (typeof playErrorSound === 'function') playErrorSound(); else new Audio('sounds/error.mp3').play().catch(()=>{});
            btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال رابط الاستعادة';
        }
    }

    document.addEventListener('keypress', e => { if (e.key === 'Enter') sendResetEmail(); });
</script>
</body>
</html>
