<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي | Falcon Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 1rem;
        }
        .profile-card {
            background: var(--bg-card);
            border-radius: 2rem;
            padding: 2rem;
            border: 1px solid var(--border-color);
        }
        .profile-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .profile-header i {
            font-size: 4rem;
            color: #D32F2F;
        }
        .game-id-section {
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }
        .game-id-section label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }
        .game-id-section input {
            width: 100%;
            padding: 12px;
            border-radius: 60px;
            border: 1px solid var(--border-color);
            background: var(--bg-body);
            color: var(--text-secondary);
        }
        .game-id-section input:disabled {
            background: #e0e0e0;
            opacity: 0.7;
        }
        .game-id-section small {
            display: block;
            margin-top: 0.5rem;
            color: var(--text-muted);
            font-size: 0.7rem;
        }
        .save-btn {
            background: #D32F2F;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
        }
        .warning {
            background: #fff3cd;
            color: #856404;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            font-size: 0.8rem;
        }
        .points {
            text-align: center;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: linear-gradient(135deg, #FFD966, #FFA000);
            border-radius: 1rem;
            color: #8B0000;
        }
        .points span {
            font-size: 2rem;
            font-weight: 800;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid #D32F2F;
            color: #D32F2F;
            padding: 8px 16px;
            border-radius: 60px;
            cursor: pointer;
            margin-top: 1rem;
            width: 100%;
        }
        .back-home {
            display: inline-block;
            margin-top: 1rem;
            color: #D32F2F;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="profile-container">
    <div class="profile-card">
        <div class="profile-header">
            <i class="fas fa-user-circle"></i>
            <h2 id="userEmail">loading...</h2>
        </div>
        
        <div class="points">
            <i class="fas fa-star"></i> نقاط الولاء: <span id="pointsValue">0</span>
            <br><small>كل 10 جنيه = 1 نقطة</small>
        </div>
        
        <div class="warning">
            <i class="fas fa-exclamation-triangle"></i> تنبيه مهم:<br>
            الـ ID الذي ستضعه لكل لعبة <strong>لن يمكنك تغييره بعد الحفظ</strong>. تأكد من كتابته بشكل صحيح لتجنب شحن حساب خاطئ.
        </div>
        
        <div id="gameIdsContainer"></div>
        
        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
        <div style="text-align: center; margin-top: 1rem;">
            <a href="index.html" class="back-home"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
    const gamesList = [
        "Free Fire", "PUBG", "Call of Duty", "eFootball", 
        "FIFA", "Roblox", "Minecraft", "TikTok Coins",
        "ChatGPT Plus", "Netflix", "Xbox", "Spotify",
        "Disney+", "Canva", "Adobe", "Gemini AI"
    ];
    
    let currentGameIds = {};
    
    async function loadProfile() {
        const user = getCurrentUser();
        if (!user) {
            window.location.href = 'login.html';
            return;
        }
        
        document.getElementById('userEmail').innerText = user.email;
        
        const points = await getLoyaltyPoints();
        document.getElementById('pointsValue').innerText = points;
        
        const doc = await db.collection('users').doc(user.uid).get();
        if (doc.exists && doc.data().gameIds) {
            currentGameIds = doc.data().gameIds;
        }
        
        const container = document.getElementById('gameIdsContainer');
        container.innerHTML = gamesList.map(game => `
            <div class="game-id-section">
                <label><i class="fas fa-gamepad"></i> ${game}</label>
                <input type="text" id="id_${game.replace(/\s/g, '')}" 
                       placeholder="أدخل الـ ID الخاص بك في ${game}"
                       value="${currentGameIds[game] || ''}"
                       ${currentGameIds[game] ? 'disabled' : ''}>
                ${currentGameIds[game] ? `<small>✅ تم الحفظ مسبقاً - لا يمكن التعديل</small>` : `<small>⚠️ بعد الحفظ لن تتمكن من تغيير هذا الـ ID</small>`}
            </div>
        `).join('');
        
        const saveBtn = document.createElement('button');
        saveBtn.className = 'save-btn';
        saveBtn.innerHTML = '<i class="fas fa-save"></i> حفظ الـ IDs الثابتة';
        saveBtn.onclick = saveGameIds;
        container.appendChild(saveBtn);
    }
    
    async function saveGameIds() {
        const user = getCurrentUser();
        if (!user) return;
        
        const newGameIds = {};
        for (const game of gamesList) {
            const input = document.getElementById(`id_${game.replace(/\s/g, '')}`);
            if (input && !input.disabled && input.value.trim()) {
                newGameIds[game] = input.value.trim();
            }
        }
        
        if (Object.keys(newGameIds).length === 0) {
            alert("❌ لم تقم بإدخال أي ID");
            return;
        }
        
        for (const [game, gameId] of Object.entries(newGameIds)) {
            const isBlocked = await isGameIDBlocked(game, gameId);
            if (isBlocked) {
                alert(`❌ الـ ID الخاص بلعبة ${game} محظور من الشحن`);
                return;
            }
        }
        
        try {
            await db.collection('users').doc(user.uid).set({
                gameIds: { ...currentGameIds, ...newGameIds }
            }, { merge: true });
            
            alert("✅ تم حفظ الـ IDs بنجاح");
            window.location.reload();
        } catch (error) {
            alert("❌ خطأ في الحفظ: " + error.message);
        }
    }
    
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        await logout();
        window.location.href = 'login.html';
    });
    
    onAuthStateChanged((user) => {
        if (!user && !window.location.pathname.includes('login.html')) {
            window.location.href = 'login.html';
        } else if (user) {
            loadProfile();
        }
    });
</script>
</body>
</html>
