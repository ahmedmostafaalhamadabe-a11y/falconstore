# ==================== Falcon Store - Netlify Configuration ====================

[build]
  # مجلد النشر (حيث توجد الملفات النهائية)
  publish = "."
  
  # أمر البناء (لا يوجد لأننا نرفع الملفات جاهزة)
  command = ""

# ==================== إعدادات الرؤوس (Headers) ====================
[[headers]]
  # تطبيق على جميع الملفات
  for = "/*"
  
  [headers.values]
    # سياسة الأمان (Content Security Policy)
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com https://cdn.jsdelivr.net https://apis.google.com https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
      font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
      img-src 'self' data: https: blob:;
      connect-src 'self' https://*.firebaseio.com https://*.firebase.com https://*.googleapis.com wss://*.firebaseio.com https://api.sniffmail.io https://api.ipify.org https://ipapi.co;
      frame-src 'self' https://*.firebaseapp.com https://*.facebook.com;
      media-src 'self' data: blob:;
    """
    
    # منع المتصفح من تخمين نوع الملف (MIME sniffing)
    X-Content-Type-Options = "nosniff"
    
    # حماية من هجمات XSS
    X-XSS-Protection = "1; mode=block"
    
    # منع تضمين الموقع في iframe (حماية من clickjacking)
    X-Frame-Options = "DENY"
    
    # سياسة المراجع (Referrer Policy)
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # سياسة الأذونات (Permissions Policy)
    Permissions-Policy = "geolocation=(self), microphone=(), camera=(), payment=(self)"

# ==================== رؤوس خاصة للملفات الثابتة ====================
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.mp3"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

