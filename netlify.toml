# ==================== تحسينات الأمان ====================
[security]
  # حماية من هجمات XSS و CSRF
  [security.headers]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# ==================== إعدادات الضغط ====================
[build.processing]
  [build.processing.css]
    bundle = true
    minify = true
  [build.processing.js]
    bundle = true
    minify = true
  [build.processing.html]
    pretty_urls = true
  [build.processing.images]
    compress = true

# ==================== إعدادات البيئة ====================
[context.production]
  # متغيرات البيئة للإنتاج (ستضعها في Netlify Dashboard وليس هنا)
  # لاحظ: لا تضع مفاتيح سرية في هذا الملف
  
[context.deploy-preview]
  # إعدادات خاصة بمعاينات النشر

[context.branch-deploy]
  # إعدادات خاصة بنشر الفروع

# ==================== تحسين الأداء ====================
[build.environment]
  NODE_VERSION = "18"
  NETLIFY_USE_YARN = "false"