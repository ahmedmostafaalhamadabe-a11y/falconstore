<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>إحصائيات المتجر | Falcon Store Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            padding: 20px;
            font-family: 'Cairo', sans-serif;
            color: white;
        }
        .stats-container { max-width: 1400px; margin: 0 auto; }
        .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 15px; }
        .stats-header h1 { color: #FFD966; display: flex; align-items: center; gap: 10px; }
        .back-link { background: rgba(255,255,255,0.1); color: white; padding: 10px 20px; border-radius: 30px; text-decoration: none; transition: 0.3s; }
        .back-link:hover { background: var(--primary); }
        
        /* بطاقات الإحصائيات */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; text-align: center; border: 1px solid rgba(255,255,255,0.2); transition: 0.3s; }
        .stat-card:hover { transform: translateY(-5px); background: rgba(255,255,255,0.15); }
        .stat-card i { font-size: 2.5rem; color: #FFD966; margin-bottom: 10px; }
        .stat-card .value { font-size: 2rem; font-weight: 800; margin-bottom: 5px; }
        .stat-card .label { color: #aaa; font-size: 0.85rem; }
        
        /* الفلاتر الزمنية */
        .filter-buttons { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-btn { background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 25px; border-radius: 30px; cursor: pointer; transition: 0.3s; }
        .filter-btn.active { background: var(--primary); color: white; }
        .filter-btn:hover { background: var(--primary-dark); }
        
        /* الجداول */
        .tables-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 30px; }
        .stats-table { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .stats-table h3 { color: #FFD966; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        .stats-table table { width: 100%; border-collapse: collapse; }
        .stats-table th, .stats-table td { padding: 12px 8px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .stats-table th { color: #FFD966; font-weight: 600; }
        .stats-table tr:hover { background: rgba(255,255,255,0.05); }
        
        /* الرسم البياني البسيط */
        .chart-container { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); border-radius: 24px; padding: 20px; margin-bottom: 30px; }
        .chart-container h3 { color: #FFD966; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .chart-bars { display: flex; align-items: flex-end; justify-content: space-around; height: 250px; gap: 15px; }
        .chart-bar { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .bar { width: 100%; background: linear-gradient(180deg, var(--primary), #FFD966); border-radius: 10px 10px 0 0; transition: height 0.5s; min-height: 5px; }
        .bar-label { font-size: 0.75rem; color: #aaa; }
        .bar-value { font-size: 0.7rem; font-weight: bold; }
        
        /* تحميل */
        .loading { text-align: center; padding: 40px; color: #aaa; }
        
        @media (max-width: 900px) {
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .tables-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 500px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="stats-container">
    <div class="stats-header">
        <h1><i class="fas fa-chart-line"></i> إحصائيات Falcon Store</h1>
        <a href="admin.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للوحة التحكم</a>
    </div>

    <!-- فلاتر الوقت -->
    <div class="filter-buttons">
        <button class="filter-btn active" data-filter="today">اليوم</button>
        <button class="filter-btn" data-filter="week">هذا الأسبوع</button>
        <button class="filter-btn" data-filter="month">هذا الشهر</button>
        <button class="filter-btn" data-filter="year">هذه السنة</button>
        <button class="filter-btn" data-filter="all">كل الوقت</button>
    </div>

    <!-- بطاقات الإحصائيات -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><i class="fas fa-coins"></i><div class="value" id="totalRevenue">0</div><div class="label">إجمالي الإيرادات (ج.م)</div></div>
        <div class="stat-card"><i class="fas fa-shopping-cart"></i><div class="value" id="totalOrders">0</div><div class="label">إجمالي الطلبات</div></div>
        <div class="stat-card"><i class="fas fa-users"></i><div class="value" id="totalUsers">0</div><div class="label">إجمالي العملاء</div></div>
        <div class="stat-card"><i class="fas fa-chart-line"></i><div class="value" id="avgOrder">0</div><div class="label">متوسط قيمة الطلب</div></div>
    </div>

    <!-- جداول المنتجات والألعاب -->
    <div class="tables-grid">
        <div class="stats-table">
            <h3><i class="fas fa-gamepad"></i> الألعاب الأكثر مبيعاً</h3>
            <table id="gamesTable">
                <thead><tr><th>اللعبة</th><th>عدد الطلبات</th><th>الإيرادات</th></tr></thead>
                <tbody><tr><td colspan="3" class="loading">جاري التحميل...</td></tr></tbody>
            </table>
        </div>
        <div class="stats-table">
            <h3><i class="fas fa-tag"></i> المنتجات الأكثر مبيعاً</h3>
            <table id="productsTable">
                <thead><tr><th>المنتج</th><th>اللعبة</th><th>عدد المبيعات</th></tr></thead>
                <tbody><tr><td colspan="3" class="loading">جاري التحميل...</td></tr></tbody>
            </table>
        </div>
    </div>

    <!-- رسم بياني للمبيعات -->
    <div class="chart-container">
        <h3><i class="fas fa-chart-bar"></i> المبيعات اليومية (آخر 7 أيام)</h3>
        <div class="chart-bars" id="dailyChart"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>

<script>
    let currentFilter = 'today';
    let allOrders = [];
    let allUsers = [];

    async function loadData() {
        try {
            const ordersSnap = await db.collection('orders').get();
            allOrders = [];
            ordersSnap.forEach(doc => allOrders.push({ id: doc.id, ...doc.data() }));
            
            const usersSnap = await db.collection('users').get();
            allUsers = [];
            usersSnap.forEach(doc => allUsers.push({ id: doc.id, ...doc.data() }));
            
            applyFilter();
        } catch (error) {
            console.error('خطأ في تحميل البيانات:', error);
        }
    }

    function applyFilter() {
        const now = new Date();
        let startDate;
        
        switch(currentFilter) {
            case 'today': startDate = new Date(now.setHours(0,0,0,0)); break;
            case 'week': startDate = new Date(now.setDate(now.getDate() - 7)); break;
            case 'month': startDate = new Date(now.setMonth(now.getMonth() - 1)); break;
            case 'year': startDate = new Date(now.setFullYear(now.getFullYear() - 1)); break;
            default: startDate = null;
        }
        
        const filteredOrders = startDate ? allOrders.filter(o => o.createdAt && o.createdAt.toDate() >= startDate) : allOrders;
        const completedOrders = filteredOrders.filter(o => o.status === 'completed');
        
        // إجمالي الإيرادات
        const totalRevenue = completedOrders.reduce((sum, o) => sum + (o.totalPrice || 0), 0);
        document.getElementById('totalRevenue').textContent = totalRevenue.toLocaleString();
        document.getElementById('totalOrders').textContent = filteredOrders.length;
        document.getElementById('totalUsers').textContent = allUsers.length;
        document.getElementById('avgOrder').textContent = filteredOrders.length > 0 ? Math.round(totalRevenue / filteredOrders.length).toLocaleString() : 0;
        
        // الألعاب الأكثر مبيعاً
        const gamesStats = {};
        completedOrders.forEach(o => {
            if (!gamesStats[o.game]) gamesStats[o.game] = { count: 0, revenue: 0 };
            gamesStats[o.game].count++;
            gamesStats[o.game].revenue += o.totalPrice || 0;
        });
        const sortedGames = Object.entries(gamesStats).sort((a,b) => b[1].count - a[1].count).slice(0, 10);
        const gamesTable = document.querySelector('#gamesTable tbody');
        if (sortedGames.length === 0) {
            gamesTable.innerHTML = '<tr><td colspan="3" class="loading">لا توجد بيانات</td></tr>';
        } else {
            gamesTable.innerHTML = sortedGames.map(([name, stats]) => `
                <tr><td>${name}</td><td>${stats.count}</td><td>${stats.revenue.toLocaleString()} ج.م</td></tr>
            `).join('');
        }
        
        // المنتجات الأكثر مبيعاً
        const productsStats = {};
        completedOrders.forEach(o => {
            const productName = o.item?.name || 'غير محدد';
            const key = `${o.game} - ${productName}`;
            if (!productsStats[key]) productsStats[key] = { count: 0, game: o.game, name: productName };
            productsStats[key].count++;
        });
        const sortedProducts = Object.entries(productsStats).sort((a,b) => b[1].count - a[1].count).slice(0, 10);
        const productsTable = document.querySelector('#productsTable tbody');
        if (sortedProducts.length === 0) {
            productsTable.innerHTML = '<tr><td colspan="3" class="loading">لا توجد بيانات</td></tr>';
        } else {
            productsTable.innerHTML = sortedProducts.map(([key, stats]) => `
                <tr><td>${stats.name}</td><td>${stats.game}</td><td>${stats.count}</td></tr>
            `).join('');
        }
        
        // الرسم البياني لآخر 7 أيام
        const last7Days = [];
        for (let i = 6; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            d.setHours(0,0,0,0);
            last7Days.push(d);
        }
        const dailySales = last7Days.map(day => {
            const dayOrders = completedOrders.filter(o => {
                if (!o.createdAt) return false;
                const orderDate = o.createdAt.toDate();
                return orderDate.toDateString() === day.toDateString();
            });
            return dayOrders.reduce((sum, o) => sum + (o.totalPrice || 0), 0);
        });
        const maxSale = Math.max(...dailySales, 1);
        const chartContainer = document.getElementById('dailyChart');
        const dayNames = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
        chartContainer.innerHTML = last7Days.map((day, i) => {
            const height = (dailySales[i] / maxSale) * 200;
            return `
                <div class="chart-bar">
                    <div class="bar" style="height: ${height}px;"></div>
                    <div class="bar-value">${dailySales[i].toLocaleString()} ج.م</div>
                    <div class="bar-label">${dayNames[day.getDay()]}</div>
                </div>
            `;
        }).join('');
    }

    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.dataset.filter;
            applyFilter();
        });
    });

    onAuthStateChanged(user => {
        if (!user || user.uid !== 'tvipwJt6kIYwTNGenxKrLhBKmRh2') {
            window.location.href = 'login.html';
        } else {
            loadData();
        }
    });
</script>
</body>
</html>
